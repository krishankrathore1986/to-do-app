<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Krishan Application</title>
  <link rel="stylesheet" href="style.css" />
  <!-- Favicon: clipboard icon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='12' fill='%236c63ff'/><rect x='16' y='20' width='32' height='30' rx='4' fill='white'/><rect x='24' y='14' width='16' height='10' rx='3' fill='%236c63ff' stroke='white' stroke-width='2'/><line x1='22' y1='31' x2='42' y2='31' stroke='%236c63ff' stroke-width='2.5' stroke-linecap='round'/><line x1='22' y1='38' x2='42' y2='38' stroke='%236c63ff' stroke-width='2.5' stroke-linecap='round'/><line x1='22' y1='45' x2='34' y2='45' stroke='%236c63ff' stroke-width='2.5' stroke-linecap='round'/></svg>" />
</head>
<body>
  <div class="container">
    <div class="app-header">
      <svg class="app-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="52" height="52">
        <rect width="64" height="64" rx="14" fill="#6c63ff"/>
        <!-- Clipboard body -->
        <rect x="14" y="18" width="36" height="36" rx="5" fill="white"/>
        <!-- Clipboard clip -->
        <rect x="22" y="12" width="20" height="12" rx="4" fill="#6c63ff" stroke="white" stroke-width="2"/>
        <!-- Checkmark row 1 -->
        <polyline points="21,30 24,33 30,27" fill="none" stroke="#6c63ff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <line x1="34" y1="30" x2="44" y2="30" stroke="#6c63ff" stroke-width="2.5" stroke-linecap="round"/>
        <!-- Checkmark row 2 -->
        <polyline points="21,40 24,43 30,37" fill="none" stroke="#6c63ff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <line x1="34" y1="40" x2="44" y2="40" stroke="#6c63ff" stroke-width="2.5" stroke-linecap="round"/>
        <!-- Dotted row 3 (pending) -->
        <line x1="21" y1="50" x2="44" y2="50" stroke="#c8c5ff" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="4 3"/>
      </svg>
      <div class="app-title-group">
        <h1>Krishan Application</h1>
        <p class="app-subtitle">Add, edit &amp; track your tasks in real time</p>
      </div>
    </div>

    <div class="input-area">
      <input type="text" id="taskInput" placeholder="Add a new task..." />
      <button id="addBtn">Add</button>
    </div>

    <div class="filters">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="active">Active</button>
      <button class="filter-btn" data-filter="completed">Completed</button>
    </div>

    <div id="status" class="status hidden">Connecting...</div>

    <ul id="taskList"></ul>

    <div class="footer">
      <span id="taskCount">0 tasks left</span>
      <button id="clearCompleted">Clear Completed</button>
    </div>
  </div>

  <!-- Edit Modal -->
  <div id="editModal" class="modal hidden">
    <div class="modal-box">
      <h2>Edit Task</h2>
      <input type="text" id="editInput" />
      <div class="modal-actions">
        <button id="saveEdit">Save</button>
        <button id="cancelEdit">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="app.js"></script>
</body>
</html>
